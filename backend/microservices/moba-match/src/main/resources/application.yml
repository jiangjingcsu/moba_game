nacos:
  server-addr: 192.168.0.105:8848
  username: nacos
  password: nacos
  namespace: public
  group: DEFAULT_GROUP
  config:
    dataId: moba-match.yml
    timeoutMs: 5000
  find:
    battle:
      service:
        group: DEFAULT_GROUP
        name: moba-battle
  service-name: moba-match
  rankTier: bronze
  register:
    enabled: true

match:
  websocket:
    port: 9998
    idleTimeoutSeconds: 120
    path: /ws/match
  rank:
    initialTolerance: 200
    maxTolerance: 800
    toleranceExpandIntervalSeconds: 10
    toleranceExpandStep: 50
  modes:
    3v3v3:
      team-count: 3
      team-size: 3
      max-party-size: 3
    5v5:
      team-count: 2
      team-size: 5
      max-party-size: 5
  cleanupIntervalMs: 30000
  toleranceExpandIntervalMs: 5000
  redisKeyExpireMinutes: 5
  defaultRankScore: 1000

redis:
  host: 192.168.0.105
  port: 6379
  password: jiangjing
  database: 1
  timeout: 5000

rocketmq:
  name-server: 192.168.0.105:9876
  producer-group: moba-match-producer
  send-timeout-ms: 3000

jwt:
  secret: moba-game-jwt-secret-key-2024-must-be-at-least-256-bits

gateway:
  internal-secret: moba-gateway-internal-secret

logging:
  level:
    root: INFO
    com.moba.match: DEBUG

netty:
  business-thread-count: 4
